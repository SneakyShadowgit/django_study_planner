<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Subject</title>
    <!-- 1. Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- 2. Container with margin-top -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <!-- 3. Bootstrap Card -->
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <!-- 6. Heading -->
                        <h2 class="card-title text-center mb-4">Add New Subject</h2>

                        <form method="post">
                            <!-- 8. CSRF Token -->
                            {% csrf_token %}

                            {{ form.as_p }}

                            <div class="d-grid gap-3 mt-4">
                                <!-- 5. Save button using primary class -->
                                <button type="submit" class="btn btn-primary">Save</button>
                                <!-- 7. Back to Dashboard button -->
                                <a href="/" class="btn btn-secondary">Back to Dashboard</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. Apply form-control styling with JS so backend isn't altered -->
    <script>
        document.querySelectorAll('input, select, textarea').forEach(function (element) {
            if (element.type !== 'submit' && element.type !== 'hidden' && element.type !== 'checkbox') {
                element.classList.add('form-control');
            } else if (element.type === 'checkbox') {
                element.classList.add('form-check-input');
            }
        });
    </script>
</body>

</html>
